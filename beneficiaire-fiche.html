<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiche Bénéficiaire — CRM FCP</title>
<link rel="stylesheet" href="css/style.css">
<style>
.fiche-header { background: white; border-bottom: 1.5px solid var(--border); padding: 28px 40px; }
.fiche-header-top { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 16px; }
.fiche-avatar {
  width: 56px; height: 56px; border-radius: 14px;
  background: #0891b2; color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; flex-shrink: 0; letter-spacing: -0.5px;
}
.fiche-identity { flex: 1; }
.fiche-name { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.2; }
.fiche-sub { font-size: 13px; color: var(--text2); margin-top: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.fiche-sub-sep { color: var(--border); }
.fiche-actions { display: flex; gap: 8px; align-items: flex-start; }
.fiche-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
.fiche-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 28px 40px; max-width: 1100px; }
@media (max-width: 768px) { .fiche-grid { grid-template-columns: 1fr; padding: 20px; } .fiche-header { padding: 20px; } }
.fiche-card { background: white; border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.fiche-card.full { grid-column: span 2; }
@media (max-width: 768px) { .fiche-card.full { grid-column: span 1; } }
.fiche-card-header { padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--bg); display: flex; align-items: center; gap: 8px; }
.fiche-card-title { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text2); font-weight: 500; }
.fiche-card-body { padding: 4px 0; }
.fiche-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 20px; border-bottom: 1px solid #f5f4f0; }
.fiche-row:last-child { border-bottom: none; }
.fiche-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; width: 140px; flex-shrink: 0; padding-top: 1px; line-height: 1.4; }
.fiche-value { font-size: 13px; color: var(--text); font-weight: 500; flex: 1; word-break: break-word; line-height: 1.5; }
.fiche-value.empty { color: var(--text3); font-style: italic; font-weight: 400; }
.fiche-value a { color: var(--accent); text-decoration: none; }
.fiche-value a:hover { text-decoration: underline; }
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { background: var(--bg); border: 1.5px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 12px; font-weight: 500; color: var(--text2); }
.back-bar { padding: 14px 40px; border-bottom: 1px solid var(--border); background: white; display: flex; align-items: center; gap: 8px; }
.back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); cursor: pointer; background: none; border: none; font-family: 'DM Sans', sans-serif; padding: 4px 0; transition: color 0.15s; }
.back-btn:hover { color: var(--accent); }
.back-sep { color: var(--text3); font-size: 12px; }
.back-current { font-size: 13px; color: var(--text); font-weight: 500; }
.fiche-loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 14px; }
</style>
</head>
<body>

<div class="toast hidden" id="toast"></div>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-title">Fondation Claude Pompidou</div>
      <div class="sidebar-logo-sub">CRM · Gestion bénévolat</div>
    </div>
    <div class="sidebar-section">Bénévoles</div>
    <a class="sidebar-item" href="benevoles.html"><span class="icon">👥</span> Bénévoles</a>
    <div class="sidebar-section">Bénéficiaires</div>
    <a class="sidebar-item active" href="beneficiaires.html"><span class="icon">🏥</span> Bénéficiaires</a>
    <div class="sidebar-section">À venir</div>
    <a class="sidebar-item disabled"><span class="icon">🏢</span> Établissements</a>
    <a class="sidebar-item disabled"><span class="icon">📋</span> Interventions</a>
    <a class="sidebar-item disabled"><span class="icon">📅</span> Formations</a>
    <a class="sidebar-item disabled"><span class="icon">📊</span> Rapports</a>
    <div class="sidebar-spacer"></div>
    <a class="sidebar-item" href="#" onclick="Auth.logout(); return false;"><span class="icon">🚪</span> Déconnexion</a>
    <div class="sidebar-footer">CRM FCP · v1.0</div>
  </aside>

  <div class="main">
    <div class="back-bar">
      <button class="back-btn" onclick="history.back()">← Retour</button>
      <span class="back-sep">/</span>
      <span class="back-current" id="breadcrumbName">Fiche bénéficiaire</span>
    </div>
    <div id="ficheContent">
      <div class="fiche-loading">
        <div class="spinner"></div>
        <div class="state-title">Chargement de la fiche…</div>
      </div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
if (!Auth.requireAuth()) {}

const TABLE_ID = 837811;

function getIdFromUrl() {
  return new URLSearchParams(window.location.search).get('id');
}

function initiales(nom, prenom) {
  return ((prenom?.[0] || '') + (nom?.[0] || '')).toUpperCase() || '?';
}

function renderFiche(row) {
  const nom     = row['Nom']       || '';
  const prenom  = row['Prénom']    || '';
  const tel     = row['Téléphone'] || '';
  const adresse = row['Adresse']   || '';
  const statut  = row['Statut']?.value || '';
  const antenne = Array.isArray(row['Antenne']) ? row['Antenne'].map(a => a.value).join(', ') : '';
  const notes   = row['Notes']     || null;

  const sorties = Array.isArray(row['Sorties']) ? row['Sorties'] : [];
  const evenements = Array.isArray(row['Événements - Présents']) ? row['Événements - Présents'] : [];

  const badge = Utils.statutBadgeClass(statut);

  document.getElementById('breadcrumbName').textContent = `${prenom} ${nom}`.trim();
  document.title = `${prenom} ${nom} — CRM FCP`;

  const html = `
    <div class="fiche-header">
      <div class="fiche-header-top">
        <div class="fiche-avatar">${Utils.escHtml(initiales(nom, prenom))}</div>
        <div class="fiche-identity">
          <div class="fiche-name">${Utils.escHtml(prenom)} ${Utils.escHtml(nom)}</div>
          <div class="fiche-sub">
            <span>${Utils.escHtml(antenne) || '—'}</span>
          </div>
          <div class="fiche-meta">
            <span class="badge ${badge}">${Utils.escHtml(statut) || '—'}</span>
          </div>
        </div>
        <div class="fiche-actions">
          <a href="beneficiaires.html" class="btn btn-ghost">← Liste</a>
        </div>
      </div>
    </div>

    <div class="fiche-grid">

      <!-- Coordonnées -->
      <div class="fiche-card">
        <div class="fiche-card-header">
          <span>📞</span>
          <span class="fiche-card-title">Coordonnées</span>
        </div>
        <div class="fiche-card-body">
          <div class="fiche-row">
            <div class="fiche-label">Téléphone</div>
            <div class="fiche-value">
              ${tel ? `<a href="tel:${Utils.escHtml(tel)}">${Utils.escHtml(tel)}</a>` : '<span class="empty">Non renseigné</span>'}
            </div>
          </div>
          <div class="fiche-row">
            <div class="fiche-label">Adresse</div>
            <div class="fiche-value ${!adresse ? 'empty' : ''}">${adresse ? Utils.escHtml(adresse) : 'Non renseignée'}</div>
          </div>
          <div class="fiche-row">
            <div class="fiche-label">Antenne</div>
            <div class="fiche-value ${!antenne ? 'empty' : ''}">${antenne ? Utils.escHtml(antenne) : 'Non renseignée'}</div>
          </div>
          <div class="fiche-row">
            <div class="fiche-label">Statut</div>
            <div class="fiche-value"><span class="badge ${badge}">${Utils.escHtml(statut) || '—'}</span></div>
          </div>
        </div>
      </div>

      <!-- Notes -->
      <div class="fiche-card">
        <div class="fiche-card-header">
          <span>📝</span>
          <span class="fiche-card-title">Notes & observations</span>
        </div>
        <div class="fiche-card-body">
          <div class="fiche-row">
            <div class="fiche-label">Notes</div>
            <div class="fiche-value ${!notes ? 'empty' : ''}" style="white-space:pre-wrap;">${notes ? Utils.escHtml(notes) : 'Aucune note'}</div>
          </div>
        </div>
      </div>

      <!-- Sorties -->
      <div class="fiche-card full">
        <div class="fiche-card-header">
          <span>🚌</span>
          <span class="fiche-card-title">Sorties (${sorties.length})</span>
        </div>
        <div class="fiche-card-body">
          <div class="fiche-row">
            <div class="fiche-label">Bénévoles liés</div>
            <div class="fiche-value">
              ${sorties.length ? `<div class="tag-list">${sorties.map(s => `<span class="tag">${Utils.escHtml(s.value || '')}</span>`).join('')}</div>` : '<span class="empty">Aucune sortie</span>'}
            </div>
          </div>
        </div>
      </div>

      <!-- Événements -->
      <div class="fiche-card full">
        <div class="fiche-card-header">
          <span>📅</span>
          <span class="fiche-card-title">Événements présents (${evenements.length})</span>
        </div>
        <div class="fiche-card-body">
          <div class="fiche-row">
            <div class="fiche-label">Événements</div>
            <div class="fiche-value">
              ${evenements.length ? `<div class="tag-list">${evenements.map(e => `<span class="tag">${Utils.escHtml(e.value || '')}</span>`).join('')}</div>` : '<span class="empty">Aucun événement</span>'}
            </div>
          </div>
        </div>
      </div>

    </div>
  `;

  document.getElementById('ficheContent').innerHTML = html;
}

async function loadFiche() {
  const id = getIdFromUrl();
  if (!id) {
    document.getElementById('ficheContent').innerHTML = `
      <div class="fiche-loading">
        <div class="state-icon">⚠️</div>
        <div class="state-title">Aucun bénéficiaire sélectionné</div>
        <a href="beneficiaires.html" class="btn btn-primary" style="margin-top:8px;">← Retour à la liste</a>
      </div>`;
    return;
  }
  try {
    const row = await API.getRow(TABLE_ID, id);
    renderFiche(row);
  } catch (err) {
    document.getElementById('ficheContent').innerHTML = `
      <div class="fiche-loading">
        <div class="state-icon">⚠️</div>
        <div class="state-title">Erreur de chargement</div>
        <div class="state-sub">${Utils.escHtml(err.message)}</div>
        <a href="beneficiaires.html" class="btn btn-ghost" style="margin-top:8px;">← Retour</a>
      </div>`;
    Utils.showToast('❌ ' + err.message, 'error');
  }
}

loadFiche();
</script>
</body>
</html>
