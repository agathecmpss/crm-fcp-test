<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bénévoles — CRM FCP</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Toast -->
<div class="toast hidden" id="toast"></div>

<!-- Panel fiche -->
<div class="panel-overlay hidden" id="fichePanel">
  <div class="panel-backdrop" onclick="closePanel()"></div>
  <div class="panel">
    <div class="panel-header">
      <div class="panel-header-info">
        <div class="panel-header-label">Fiche bénévole</div>
        <div class="panel-header-name" id="panelName">—</div>
      </div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-body" id="panelBody">
      <div class="state-box"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- App -->
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-title">Fondation Claude Pompidou</div>
      <div class="sidebar-logo-sub">CRM · Gestion bénévolat</div>
    </div>

    <div class="sidebar-section">Bénévoles</div>
    <a class="sidebar-item active" href="benevoles.html">
      <span class="icon">👥</span> Bénévoles
    </a>

    <div class="sidebar-section">À venir</div>
    <a class="sidebar-item disabled"><span class="icon">🏥</span> Bénéficiaires</a>
    <a class="sidebar-item disabled"><span class="icon">🏢</span> Établissements</a>
    <a class="sidebar-item disabled"><span class="icon">📋</span> Interventions</a>
    <a class="sidebar-item disabled"><span class="icon">📅</span> Formations</a>
    <a class="sidebar-item disabled"><span class="icon">📊</span> Rapports</a>

    <div class="sidebar-spacer"></div>

    <a class="sidebar-item" href="#" onclick="Auth.logout(); return false;">
      <span class="icon">🚪</span> Déconnexion
    </a>
    <div class="sidebar-footer">CRM FCP · v1.0</div>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">Bénévoles</div>
        <div class="topbar-count" id="totalCount">—</div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost" onclick="loadData()">🔄 Actualiser</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          placeholder="Rechercher par nom, prénom, email…"
          oninput="applyFilters()"
        />
      </div>
      <select class="filter-select" id="filterStatut" onchange="applyFilters()">
        <option value="">Tous les statuts</option>
      </select>
      <select class="filter-select" id="filterAntenne" onchange="applyFilters()">
        <option value="">Toutes les antennes</option>
      </select>
      <button class="btn-reset" onclick="resetFilters()">✕ Réinitialiser</button>
    </div>

    <!-- Content -->
    <div class="content">
      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th class="sortable sorted" onclick="sortBy('nom')">NOM <span id="sort-nom">↑</span></th>
              <th>EMAIL</th>
              <th>TÉLÉPHONE</th>
              <th class="sortable" onclick="sortBy('antenne')">ANTENNE <span id="sort-antenne">↕</span></th>
              <th class="sortable" onclick="sortBy('statut')">STATUT <span id="sort-statut">↕</span></th>
              <th>TYPE MISSION</th>
              <th class="sortable" onclick="sortBy('date')">ENGAGEMENT <span id="sort-date">↕</span></th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="7">
              <div class="state-box">
                <div class="spinner"></div>
                <div class="state-title">Chargement…</div>
              </div>
            </td></tr>
          </tbody>
        </table>
        <div class="pagination" id="paginationBar" style="display:none;">
          <div class="pagination-info" id="paginationInfo"></div>
          <div class="pagination-controls" id="paginationControls"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
// ── Garde d'authentification ──
if (!Auth.requireAuth()) { /* redirigé */ }

// ── État local ──
let allRows      = [];
let filteredRows = [];
let currentPage  = 1;
let sortField    = 'nom';
let sortDir      = 1;

// Colonnes détectées dynamiquement
let col = {};

function detectColumns(rows) {
  if (!rows.length) return;
  const r = rows[0];
  col.nom     = Utils.findCol(r, 'nom', 'name', 'lastname');
  col.prenom  = Utils.findCol(r, 'prenom', 'prénom', 'firstname');
  col.email   = Utils.findCol(r, 'email', 'mail', 'courriel');
  col.tel     = Utils.findCol(r, 'telephone', 'téléphone', 'tel', 'mobile', 'portable');
  col.antenne = Utils.findCol(r, 'antenne', 'antenna', 'secteur');
  col.statut  = Utils.findCol(r, 'statut', 'status', 'etat', 'état');
  col.mission = Utils.findCol(r, 'typemission', 'type_mission', 'typebenevol', 'mission');
  col.date    = Utils.findCol(r, 'dateengagement', 'datedebut', 'dateentree', 'datesignature');
}

// ── Filtres ──
function buildFilterOptions(rows) {
  const statuts  = [...new Set(rows.map(r => col.statut  ? Utils.formatValue(r[col.statut])  : '').filter(Boolean))].sort();
  const antennes = [...new Set(rows.map(r => col.antenne ? Utils.formatValue(r[col.antenne]) : '').filter(Boolean))].sort();

  const selS = document.getElementById('filterStatut');
  const curS = selS.value;
  selS.innerHTML = '<option value="">Tous les statuts</option>' +
    statuts.map(s => `<option value="${Utils.escHtml(s)}" ${s===curS?'selected':''}>${Utils.escHtml(s)}</option>`).join('');

  const selA = document.getElementById('filterAntenne');
  const curA = selA.value;
  selA.innerHTML = '<option value="">Toutes les antennes</option>' +
    antennes.map(a => `<option value="${Utils.escHtml(a)}" ${a===curA?'selected':''}>${Utils.escHtml(a)}</option>`).join('');
}

function applyFilters() {
  const search  = document.getElementById('searchInput').value.toLowerCase().trim();
  const statut  = document.getElementById('filterStatut').value;
  const antenne = document.getElementById('filterAntenne').value;

  filteredRows = allRows.filter(r => {
    if (search) {
      const nom    = col.nom    ? Utils.formatValue(r[col.nom]).toLowerCase()    : '';
      const prenom = col.prenom ? Utils.formatValue(r[col.prenom]).toLowerCase() : '';
      const email  = col.email  ? Utils.formatValue(r[col.email]).toLowerCase()  : '';
      if (!nom.includes(search) && !prenom.includes(search) && !email.includes(search)) return false;
    }
    if (statut  && col.statut  && Utils.formatValue(r[col.statut])  !== statut)  return false;
    if (antenne && col.antenne && Utils.formatValue(r[col.antenne]) !== antenne) return false;
    return true;
  });

  currentPage = 1;
  doSort();
  renderTable();
}

function resetFilters() {
  document.getElementById('searchInput').value   = '';
  document.getElementById('filterStatut').value  = '';
  document.getElementById('filterAntenne').value = '';
  applyFilters();
}

// ── Tri ──
function sortBy(field) {
  if (sortField === field) sortDir *= -1;
  else { sortField = field; sortDir = 1; }
  // Mise à jour icônes
  ['nom','antenne','statut','date'].forEach(f => {
    const el = document.getElementById(`sort-${f}`);
    if (!el) return;
    el.textContent = f === sortField ? (sortDir === 1 ? '↑' : '↓') : '↕';
  });
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  const idx = { nom:0, antenne:3, statut:4, date:6 }[field];
  if (idx !== undefined) document.querySelectorAll('thead th')[idx]?.classList.add('sorted');
  doSort();
  renderTable();
}

function doSort() {
  const colMap = { nom: col.nom, antenne: col.antenne, statut: col.statut, date: col.date };
  const c = colMap[sortField];
  if (!c) return;
  filteredRows.sort((a, b) => {
    const va = Utils.formatValue(a[c]).toLowerCase();
    const vb = Utils.formatValue(b[c]).toLowerCase();
    return va < vb ? -sortDir : va > vb ? sortDir : 0;
  });
}

// ── Rendu tableau ──
function renderTable() {
  const total  = filteredRows.length;
  const start  = (currentPage - 1) * FCP_CONFIG.pageSize;
  const end    = Math.min(start + FCP_CONFIG.pageSize, total);
  const page   = filteredRows.slice(start, end);
  const tbody  = document.getElementById('tableBody');

  document.getElementById('totalCount').textContent = `${total} bénévole${total !== 1 ? 's' : ''}`;

  if (!page.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="state-box">
      <div class="state-icon">🔍</div>
      <div class="state-title">Aucun résultat</div>
      <div class="state-sub">Modifiez vos filtres ou votre recherche.</div>
    </div></td></tr>`;
    document.getElementById('paginationBar').style.display = 'none';
    return;
  }

  tbody.innerHTML = page.map(row => {
    const nom    = col.nom    ? Utils.formatValue(row[col.nom])    : '—';
    const prenom = col.prenom ? Utils.formatValue(row[col.prenom]) : '';
    const email  = col.email  ? Utils.formatValue(row[col.email])  : '—';
    const tel    = col.tel    ? Utils.formatValue(row[col.tel])    : '—';
    const ant    = col.antenne ? Utils.formatValue(row[col.antenne]) : '—';
    const stat   = col.statut  ? Utils.formatValue(row[col.statut])  : '—';
    const miss   = col.mission ? Utils.formatValue(row[col.mission]) : '—';
    const date   = col.date    ? Utils.formatDate(row[col.date])     : '—';
    const badge  = Utils.statutBadgeClass(stat);

    return `<tr class="clickable" onclick="openPanel(${row.id})">
      <td>
        <div class="cell-primary">${Utils.escHtml(nom)}</div>
        <div class="cell-secondary">${Utils.escHtml(prenom)}</div>
      </td>
      <td class="cell-secondary">${Utils.escHtml(email)}</td>
      <td class="cell-mono">${Utils.escHtml(tel)}</td>
      <td>${Utils.escHtml(ant)}</td>
      <td><span class="badge ${badge}">${Utils.escHtml(stat)}</span></td>
      <td class="cell-mono">${Utils.escHtml(miss)}</td>
      <td class="cell-mono">${Utils.escHtml(date)}</td>
    </tr>`;
  }).join('');

  renderPagination(total, start, end);
}

function renderPagination(total, start, end) {
  const totalPages = Math.ceil(total / FCP_CONFIG.pageSize);
  const bar = document.getElementById('paginationBar');
  bar.style.display = 'flex';

  document.getElementById('paginationInfo').textContent = `${start + 1}–${end} sur ${total}`;

  const ctrl = document.getElementById('paginationControls');
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  let lastDot = false;
  for (let p = 1; p <= totalPages; p++) {
    const near = Math.abs(p - currentPage) <= 1 || p === 1 || p === totalPages;
    if (near) {
      html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
      lastDot = false;
    } else if (!lastDot) {
      html += `<button class="page-btn" disabled style="border:none;background:none;">…</button>`;
      lastDot = true;
    }
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  ctrl.innerHTML = html;
}

function goPage(p) {
  const max = Math.ceil(filteredRows.length / FCP_CONFIG.pageSize);
  if (p < 1 || p > max) return;
  currentPage = p;
  renderTable();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Panel fiche ──
function openPanel(id) {
  document.getElementById('fichePanel').classList.remove('hidden');
  document.getElementById('panelName').textContent = '…';
  document.getElementById('panelBody').innerHTML = '<div class="state-box"><div class="spinner"></div></div>';

  const row = allRows.find(r => r.id === id);
  if (!row) return;
  renderPanel(row);
}

function renderPanel(row) {
  const nom    = col.nom    ? Utils.formatValue(row[col.nom])    : '';
  const prenom = col.prenom ? Utils.formatValue(row[col.prenom]) : '';
  const statut = col.statut ? Utils.formatValue(row[col.statut]) : '';
  const ant    = col.antenne ? Utils.formatValue(row[col.antenne]) : '';
  const badge  = Utils.statutBadgeClass(statut);

  document.getElementById('panelName').textContent = `${nom} ${prenom}`.trim() || `#${row.id}`;

  const fields = Object.entries(row)
    .filter(([k]) => k !== 'id' && k !== 'order')
    .map(([k, v]) => {
      const val = Utils.formatValue(v);
      return `<div class="panel-field">
        <div class="panel-field-label">${Utils.escHtml(k)}</div>
        <div class="panel-field-value ${!val ? 'empty' : ''}">${val ? Utils.escHtml(val) : 'Non renseigné'}</div>
      </div>`;
    }).join('');

  document.getElementById('panelBody').innerHTML = `
    <div style="margin-bottom:14px;">
      <span class="badge ${badge}">${Utils.escHtml(statut) || '—'}</span>
      <span style="font-size:11px; color:var(--text3); margin-left:8px; font-family:'DM Mono',monospace;">${Utils.escHtml(ant)} · ID #${row.id}</span>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Informations</div>
      ${fields}
    </div>

    <div style="margin-top:24px; display:flex; gap:8px;">
      <a href="https://app.baserow.io/database/${FCP_CONFIG.tables.benevoles}/" target="_blank"
         class="btn btn-ghost" style="flex:1; justify-content:center;">
        🔗 Ouvrir dans Baserow
      </a>
    </div>
  `;
}

function closePanel() {
  document.getElementById('fichePanel').classList.add('hidden');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// ── Chargement ──
async function loadData() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = `<tr><td colspan="7"><div class="state-box">
    <div class="spinner"></div>
    <div class="state-title">Chargement…</div>
    <div class="state-sub">Connexion à Baserow</div>
  </div></td></tr>`;
  document.getElementById('paginationBar').style.display = 'none';
  document.getElementById('totalCount').textContent = '…';

  try {
    allRows = await API.getAllRows(FCP_CONFIG.tables.benevoles);
    detectColumns(allRows);
    buildFilterOptions(allRows);
    filteredRows = [...allRows];
    doSort();
    renderTable();
    Utils.showToast(`✅ ${allRows.length} bénévoles chargés`, 'success');
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="state-box">
      <div class="state-icon">⚠️</div>
      <div class="state-title">Erreur de chargement</div>
      <div class="state-sub">${Utils.escHtml(err.message)}</div>
    </div></td></tr>`;
    Utils.showToast('❌ ' + err.message, 'error');
    document.getElementById('totalCount').textContent = 'Erreur';
  }
}

loadData();
</script>
</body>
</html>
