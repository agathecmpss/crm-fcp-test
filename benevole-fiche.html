<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiche Bénévole — CRM FCP</title>
<link rel="stylesheet" href="css/style.css">
<style>
.fiche-header { background: white; border-bottom: 1.5px solid var(--border); padding: 28px 40px; }
.fiche-header-top { display: flex; align-items: flex-start; gap: 20px; }
.fiche-avatar { width: 56px; height: 56px; border-radius: 14px; background: var(--text); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; flex-shrink: 0; letter-spacing: -0.5px; }
.fiche-identity { flex: 1; }
.fiche-name { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.2; }
.fiche-sub { font-size: 13px; color: var(--text2); margin-top: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.fiche-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
.fiche-actions { display: flex; gap: 8px; align-items: flex-start; flex-shrink: 0; }
.fiche-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 28px 40px; max-width: 1100px; }
@media (max-width: 768px) { .fiche-grid { grid-template-columns: 1fr; padding: 20px; } .fiche-header { padding: 20px; } }
.fiche-card { background: white; border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.fiche-card.full { grid-column: span 2; }
@media (max-width: 768px) { .fiche-card.full { grid-column: span 1; } }
.fiche-card-header { padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--bg); display: flex; align-items: center; gap: 8px; }
.fiche-card-title { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text2); font-weight: 500; }
.fiche-card-body { padding: 4px 0; }
.fiche-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 20px; border-bottom: 1px solid #f5f4f0; }
.fiche-row:last-child { border-bottom: none; }
.fiche-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; width: 140px; flex-shrink: 0; padding-top: 2px; line-height: 1.4; }
.fiche-value { font-size: 13px; color: var(--text); font-weight: 500; flex: 1; word-break: break-word; line-height: 1.5; }
.fiche-value.empty { color: var(--text3); font-style: italic; font-weight: 400; }
.fiche-value a { color: var(--accent); text-decoration: none; }
.fiche-value a:hover { text-decoration: underline; }
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { background: var(--bg); border: 1.5px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 12px; font-weight: 500; color: var(--text2); }
.back-bar { padding: 14px 40px; border-bottom: 1px solid var(--border); background: white; display: flex; align-items: center; gap: 8px; }
.back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); cursor: pointer; background: none; border: none; font-family: 'DM Sans', sans-serif; padding: 4px 0; transition: color 0.15s; }
.back-btn:hover { color: var(--accent); }
.back-sep { color: var(--text3); font-size: 12px; }
.back-current { font-size: 13px; color: var(--text); font-weight: 500; }
.fiche-loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 14px; }

/* MODE ÉDITION */
.edit-input { width: 100%; border: 1.5px solid var(--border); border-radius: 7px; padding: 7px 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); outline: none; transition: border-color 0.15s; background: white; }
.edit-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
.edit-textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 7px; padding: 7px 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); outline: none; transition: border-color 0.15s; background: white; resize: vertical; min-height: 80px; }
.edit-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
.edit-banner { background: #fffbeb; border-bottom: 1.5px solid #fcd34d; padding: 12px 40px; display: none; align-items: center; justify-content: space-between; gap: 12px; }
.edit-banner.visible { display: flex; }
.edit-banner-text { font-size: 13px; color: var(--warn); font-weight: 600; }
.edit-banner-actions { display: flex; gap: 8px; }
.fiche-row.modified .fiche-label { color: var(--warn); }
</style>
</head>
<body>

<div class="toast hidden" id="toast"></div>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-title">Fondation Claude Pompidou</div>
      <div class="sidebar-logo-sub">CRM · Gestion bénévolat</div>
    </div>
    <div class="sidebar-section">Bénévoles</div>
    <a class="sidebar-item active" href="benevoles.html"><span class="icon">👥</span> Bénévoles</a>
    <div class="sidebar-section">Bénéficiaires</div>
    <a class="sidebar-item" href="beneficiaires.html"><span class="icon">🏥</span> Bénéficiaires</a>
    <div class="sidebar-section">À venir</div>
    <a class="sidebar-item disabled"><span class="icon">🏢</span> Établissements</a>
    <a class="sidebar-item disabled"><span class="icon">📋</span> Interventions</a>
    <a class="sidebar-item disabled"><span class="icon">📅</span> Formations</a>
    <a class="sidebar-item disabled"><span class="icon">📊</span> Rapports</a>
    <div class="sidebar-spacer"></div>
    <a class="sidebar-item" href="#" onclick="Auth.logout(); return false;"><span class="icon">🚪</span> Déconnexion</a>
    <div class="sidebar-footer">CRM FCP · v1.0</div>
  </aside>

  <div class="main">
    <div class="back-bar">
      <button class="back-btn" onclick="confirmLeave()">← Retour</button>
      <span class="back-sep">/</span>
      <span class="back-current" id="breadcrumbName">Fiche bénévole</span>
    </div>

    <div class="edit-banner" id="editBanner">
      <div class="edit-banner-text">✏️ Mode édition — modifications non enregistrées</div>
      <div class="edit-banner-actions">
        <button class="btn btn-ghost" onclick="cancelEdit()">Annuler</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveChanges()">💾 Enregistrer</button>
      </div>
    </div>

    <div id="ficheContent">
      <div class="fiche-loading"><div class="spinner"></div><div class="state-title">Chargement…</div></div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
if (!Auth.requireAuth()) {}

const TABLE_ID = FCP_CONFIG.tables.benevoles;
let currentRow = null;
let editMode   = false;
let hasChanges = false;

function getIdFromUrl() { return new URLSearchParams(window.location.search).get('id'); }
function initiales(nom, prenom) { return ((prenom?.[0]||'')+(nom?.[0]||'')).toUpperCase()||'?'; }
function markModified(rowEl) { rowEl?.classList.add('modified'); hasChanges = true; }

function renderFiche(row, editing = false) {
  const nom    = row['Nom']        || '';
  const prenom = row['Prénom']     || '';
  const email  = row['Email']      || '';
  const tel    = row['Téléphone']  || '';
  const statut = row['Statut']?.value || '';
  const antenne = Array.isArray(row['Antenne']) ? row['Antenne'].map(a => a.value).join(', ') : '';
  const dob    = row['Date de Naissance'] || '';
  const dobFmt = Utils.formatDate(dob);
  const age    = row['Âge'] || '';
  const adresse = row['Adresse']     || '';
  const cp      = row['Code postal'] || '';
  const ville   = row['Ville']       || '';
  const dateInscription = Utils.formatDate(row["Date d'inscription"]);
  const dateCreation    = Utils.formatDate(row['Date de création']);
  const notes           = row['Notes'] || '';
  const noteInscription = row["Note d'inscription"] || '';
  const radie           = row['Est radié'] === true;
  const raisonRadiation = row['Raison de la radiation'] || '';
  const planning  = Array.isArray(row['Planning'])  ? row['Planning']  : [];
  const sorties   = Array.isArray(row['Sorties'])   ? row['Sorties']   : [];
  const ri        = Array.isArray(row["Réunion d'information"]) ? row["Réunion d'information"] : [];
  const badge = Utils.statutBadgeClass(statut);

  document.getElementById('breadcrumbName').textContent = `${prenom} ${nom}`.trim();
  document.title = `${prenom} ${nom} — CRM FCP`;

  const F = (label, val, id, type='text') => editing
    ? `<div class="fiche-row" id="row-${id}"><div class="fiche-label">${label}</div><div class="fiche-value"><input type="${type}" class="edit-input" id="${id}" value="${Utils.escHtml(val)}" oninput="markModified(document.getElementById('row-${id}'))"/></div></div>`
    : `<div class="fiche-row"><div class="fiche-label">${label}</div><div class="fiche-value ${!val?'empty':''}">${val?(type==='email'?`<a href="mailto:${Utils.escHtml(val)}">${Utils.escHtml(val)}</a>`:type==='tel'?`<a href="tel:${Utils.escHtml(val)}">${Utils.escHtml(val)}</a>`:Utils.escHtml(val)):'Non renseigné'}</div></div>`;

  const FA = (label, val, id) => editing
    ? `<div class="fiche-row" id="row-${id}"><div class="fiche-label">${label}</div><div class="fiche-value"><textarea class="edit-textarea" id="${id}" oninput="markModified(document.getElementById('row-${id}'))">${Utils.escHtml(val)}</textarea></div></div>`
    : `<div class="fiche-row"><div class="fiche-label">${label}</div><div class="fiche-value ${!val?'empty':''}" style="white-space:pre-wrap;">${val?Utils.escHtml(val):'Aucune note'}</div></div>`;

  const RO = (label, content) => `<div class="fiche-row"><div class="fiche-label">${label}</div><div class="fiche-value">${content}</div></div>`;
  const tags = (items) => items.length ? `<div class="tag-list">${items.map(i=>`<span class="tag">${Utils.escHtml(i.value||'')}</span>`).join('')}</div>` : '<span class="empty">—</span>';

  document.getElementById('ficheContent').innerHTML = `
    ${radie ? `<div style="margin:20px 40px 0;background:#1f2937;border:1.5px solid #374151;border-radius:10px;padding:12px 18px;color:#f3f4f6;font-size:13px;font-weight:500;">⛔ Ce bénévole est radié${raisonRadiation?' — '+Utils.escHtml(raisonRadiation):''}.</div>` : ''}

    <div class="fiche-header">
      <div class="fiche-header-top">
        <div class="fiche-avatar">${Utils.escHtml(initiales(nom,prenom))}</div>
        <div class="fiche-identity">
          <div class="fiche-name">${Utils.escHtml(prenom)} ${Utils.escHtml(nom)}</div>
          <div class="fiche-sub">
            <span>${Utils.escHtml(antenne)||'—'}</span>
            ${age?`<span style="color:var(--border)">·</span><span>${Utils.escHtml(age)} ans</span>`:''}
            ${dateInscription!=='—'?`<span style="color:var(--border)">·</span><span>Inscrit·e le ${dateInscription}</span>`:''}
          </div>
          <div class="fiche-meta">
            <span class="badge ${badge}">${Utils.escHtml(statut)||'—'}</span>
            ${editing?'<span style="font-size:11px;color:var(--warn);font-weight:600;">✏️ Mode édition</span>':''}
          </div>
        </div>
        <div class="fiche-actions">
          ${!editing
            ? `<button class="btn btn-ghost" onclick="startEdit()">✏️ Modifier</button>
               <a href="https://app.baserow.io/database/${TABLE_ID}/" target="_blank" class="btn btn-ghost">🔗 Baserow</a>
               <a href="benevoles.html" class="btn btn-ghost">← Liste</a>`
            : `<button class="btn btn-ghost" onclick="cancelEdit()">✕ Annuler</button>
               <button class="btn btn-primary" onclick="saveChanges()">💾 Enregistrer</button>`}
        </div>
      </div>
    </div>

    <div class="fiche-grid">

      <div class="fiche-card">
        <div class="fiche-card-header"><span>📞</span><span class="fiche-card-title">Coordonnées</span></div>
        <div class="fiche-card-body">
          ${F('Email',       email,   'f-email',   'email')}
          ${F('Téléphone',   tel,     'f-tel',     'tel')}
          ${F('Adresse',     adresse, 'f-adresse')}
          ${F('Code postal', cp,      'f-cp')}
          ${F('Ville',       ville,   'f-ville')}
        </div>
      </div>

      <div class="fiche-card">
        <div class="fiche-card-header"><span>👤</span><span class="fiche-card-title">Informations personnelles</span></div>
        <div class="fiche-card-body">
          ${F('Nom',              nom,    'f-nom')}
          ${F('Prénom',           prenom, 'f-prenom')}
          ${F('Date de naissance', dob,   'f-dob', 'date')}
          ${RO('Âge',      age ? `${Utils.escHtml(age)} ans` : '<span class="empty">—</span>')}
          ${RO('Antenne',  Utils.escHtml(antenne)||'<span class="empty">—</span>')}
          ${RO('Statut',   `<span class="badge ${badge}">${Utils.escHtml(statut)||'—'}</span>`)}
          ${RO('Inscription',  dateInscription!=='—' ? dateInscription : '<span class="empty">—</span>')}
          ${RO('Fiche créée', dateCreation!=='—' ? dateCreation : '<span class="empty">—</span>')}
        </div>
      </div>

      <div class="fiche-card">
        <div class="fiche-card-header"><span>🤝</span><span class="fiche-card-title">Activité bénévole</span></div>
        <div class="fiche-card-body">
          ${RO('Planning', tags(planning))}
          ${RO('Sorties',  tags(sorties))}
          ${RO("Réunion d'info", ri.length ? Utils.escHtml(ri[0]?.value||'') : '<span class="empty">—</span>')}
        </div>
      </div>

      <div class="fiche-card">
        <div class="fiche-card-header"><span>📝</span><span class="fiche-card-title">Notes & observations</span></div>
        <div class="fiche-card-body">
          ${FA('Notes',             notes,           'f-notes')}
          ${FA("Note d'inscription", noteInscription, 'f-note-inscription')}
          ${radie ? FA('Raison radiation', raisonRadiation, 'f-raison-radiation') : ''}
        </div>
      </div>

    </div>
  `;

  document.getElementById('editBanner').classList.toggle('visible', editing);
}

function startEdit()  { editMode = true;  hasChanges = false; renderFiche(currentRow, true); }

function cancelEdit() {
  if (hasChanges && !confirm('Abandonner les modifications ?')) return;
  editMode = false; hasChanges = false; renderFiche(currentRow, false);
}

function confirmLeave() {
  if (editMode && hasChanges && !confirm('Des modifications non enregistrées seront perdues. Continuer ?')) return;
  history.back();
}

async function saveChanges() {
  const btn = document.getElementById('saveBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Enregistrement…'; }

  const fieldsMap = {
    'Nom': 'f-nom', 'Prénom': 'f-prenom', 'Email': 'f-email',
    'Téléphone': 'f-tel', 'Adresse': 'f-adresse', 'Code postal': 'f-cp',
    'Ville': 'f-ville', 'Date de Naissance': 'f-dob',
    'Notes': 'f-notes', "Note d'inscription": 'f-note-inscription',
    'Raison de la radiation': 'f-raison-radiation',
  };

  const data = {};
  for (const [key, id] of Object.entries(fieldsMap)) {
    const el = document.getElementById(id);
    if (el) data[key] = el.value;
  }

  try {
    currentRow = await API.updateRow(TABLE_ID, currentRow.id, data);
    editMode = false; hasChanges = false;
    renderFiche(currentRow, false);
    Utils.showToast('✅ Modifications enregistrées', 'success');
  } catch (err) {
    Utils.showToast('❌ ' + err.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = '💾 Enregistrer'; }
  }
}

window.addEventListener('beforeunload', e => {
  if (editMode && hasChanges) { e.preventDefault(); e.returnValue = ''; }
});

async function loadFiche() {
  const id = getIdFromUrl();
  if (!id) {
    document.getElementById('ficheContent').innerHTML = `<div class="fiche-loading"><div class="state-icon">⚠️</div><div class="state-title">Aucun bénévole sélectionné</div><a href="benevoles.html" class="btn btn-primary" style="margin-top:8px;">← Retour</a></div>`;
    return;
  }
  try {
    currentRow = await API.getRow(TABLE_ID, id);
    renderFiche(currentRow, false);
  } catch (err) {
    document.getElementById('ficheContent').innerHTML = `<div class="fiche-loading"><div class="state-icon">⚠️</div><div class="state-title">Erreur</div><div class="state-sub">${Utils.escHtml(err.message)}</div><a href="benevoles.html" class="btn btn-ghost" style="margin-top:8px;">← Retour</a></div>`;
    Utils.showToast('❌ ' + err.message, 'error');
  }
}

loadFiche();
</script>
</body>
</html>
