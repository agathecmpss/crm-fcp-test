<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiche Bénévole — CRM FCP</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ── Spécifique fiche ── */
.fiche-header {
  background: white;
  border-bottom: 1.5px solid var(--border);
  padding: 28px 40px;
}
.fiche-header-top {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 16px;
}
.fiche-avatar {
  width: 56px; height: 56px;
  border-radius: 14px;
  background: var(--text);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  flex-shrink: 0;
  letter-spacing: -0.5px;
}
.fiche-identity { flex: 1; }
.fiche-name {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
  line-height: 1.2;
}
.fiche-sub {
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.fiche-sub-sep { color: var(--border); }
.fiche-actions { display: flex; gap: 8px; align-items: flex-start; }
.fiche-meta {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 4px;
}

/* ── Grid fiche ── */
.fiche-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 28px 40px;
  max-width: 1100px;
}
@media (max-width: 768px) {
  .fiche-grid { grid-template-columns: 1fr; padding: 20px; }
  .fiche-header { padding: 20px; }
}
.fiche-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.fiche-card.full { grid-column: span 2; }
@media (max-width: 768px) { .fiche-card.full { grid-column: span 1; } }
.fiche-card-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  display: flex;
  align-items: center;
  gap: 8px;
}
.fiche-card-title {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text2);
  font-weight: 500;
}
.fiche-card-icon { font-size: 14px; }
.fiche-card-body { padding: 4px 0; }

.fiche-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 20px;
  border-bottom: 1px solid #f5f4f0;
}
.fiche-row:last-child { border-bottom: none; }
.fiche-label {
  font-size: 11px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
  width: 140px;
  flex-shrink: 0;
  padding-top: 1px;
  line-height: 1.4;
}
.fiche-value {
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
  flex: 1;
  word-break: break-word;
  line-height: 1.5;
}
.fiche-value.empty {
  color: var(--text3);
  font-style: italic;
  font-weight: 400;
}
.fiche-value a {
  color: var(--accent);
  text-decoration: none;
}
.fiche-value a:hover { text-decoration: underline; }

/* ── Tags liens ── */
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
}

/* ── Statut radié ── */
.alerte-radie {
  margin: 0 40px 0;
  background: #1f2937;
  border: 1.5px solid #374151;
  border-radius: 10px;
  padding: 12px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: #f3f4f6;
  font-weight: 500;
}

/* ── Back button ── */
.back-bar {
  padding: 14px 40px;
  border-bottom: 1px solid var(--border);
  background: white;
  display: flex;
  align-items: center;
  gap: 8px;
}
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'DM Sans', sans-serif;
  padding: 4px 0;
  transition: color 0.15s;
}
.back-btn:hover { color: var(--accent); }
.back-sep { color: var(--text3); font-size: 12px; }
.back-current { font-size: 13px; color: var(--text); font-weight: 500; }

/* ── Loading ── */
.fiche-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  flex-direction: column;
  gap: 14px;
}
</style>
</head>
<body>

<div class="toast hidden" id="toast"></div>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-title">Fondation Claude Pompidou</div>
      <div class="sidebar-logo-sub">CRM · Gestion bénévolat</div>
    </div>
    <div class="sidebar-section">Bénévoles</div>
    <a class="sidebar-item active" href="benevoles.html">
      <span class="icon">👥</span> Bénévoles
    </a>
    <div class="sidebar-section">À venir</div>
    <a class="sidebar-item disabled"><span class="icon">🏥</span> Bénéficiaires</a>
    <a class="sidebar-item disabled"><span class="icon">🏢</span> Établissements</a>
    <a class="sidebar-item disabled"><span class="icon">📋</span> Interventions</a>
    <a class="sidebar-item disabled"><span class="icon">📅</span> Formations</a>
    <a class="sidebar-item disabled"><span class="icon">📊</span> Rapports</a>
    <div class="sidebar-spacer"></div>
    <a class="sidebar-item" href="#" onclick="Auth.logout(); return false;">
      <span class="icon">🚪</span> Déconnexion
    </a>
    <div class="sidebar-footer">CRM FCP · v1.0</div>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Back bar -->
    <div class="back-bar">
      <button class="back-btn" onclick="history.back()">← Retour</button>
      <span class="back-sep">/</span>
      <span class="back-current" id="breadcrumbName">Fiche bénévole</span>
    </div>

    <!-- Contenu chargé dynamiquement -->
    <div id="ficheContent">
      <div class="fiche-loading">
        <div class="spinner"></div>
        <div class="state-title">Chargement de la fiche…</div>
      </div>
    </div>

  </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
if (!Auth.requireAuth()) { /* redirigé */ }

// ── Récupère l'ID depuis l'URL ──
function getIdFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

// ── Initiales pour l'avatar ──
function initiales(nom, prenom) {
  return ((prenom?.[0] || '') + (nom?.[0] || '')).toUpperCase() || '?';
}

// ── Formate un champ lien Baserow (array d'objets) ──
function formatLink(val) {
  if (!Array.isArray(val) || !val.length) return null;
  return val.map(v => v.value || v.name || String(v)).join(', ');
}

// ── Rendu de la fiche ──
function renderFiche(row) {
  const nom    = row['Nom']    || '';
  const prenom = row['Prénom'] || '';
  const email  = row['Email']  || '';
  const tel    = row['Téléphone'] || '';
  const statut = row['Statut']?.value || '';
  const antenne = formatLink(row['Antenne']) || '';
  const dob    = Utils.formatDate(row['Date de Naissance']);
  const age    = row['Âge'] || '';
  const adresse = [row['Adresse'], row['Code postal'], row['Ville']].filter(Boolean).join(' ') || null;
  const dateInscription = Utils.formatDate(row["Date d'inscription"]);
  const dateCreation    = Utils.formatDate(row['Date de création']);
  const notes  = row['Notes'] || null;
  const radie  = row['Est radié'] === true;
  const raisonRadiation = row['Raison de la radiation'] || null;
  const noteInscription = row["Note d'inscription"] || null;
  const planning = formatLink(row['Planning']);
  const sorties  = formatLink(row['Sorties']);
  const ri       = formatLink(row['Réunion d\'information']) || formatLink(row["Réunion d'information"]);

  const badgeClass = Utils.statutBadgeClass(statut);

  // Mise à jour breadcrumb
  document.getElementById('breadcrumbName').textContent = `${prenom} ${nom}`.trim();
  document.title = `${prenom} ${nom} — CRM FCP`;

  // Alerte radié
  const alerteRadie = radie ? `
    <div class="alerte-radie" style="margin: 20px 40px 0;">
      ⛔ Ce bénévole est radié${raisonRadiation ? ` — ${Utils.escHtml(raisonRadiation)}` : ''}.
    </div>` : '';

  const html = `
    ${alerteRadie}

    <!-- En-tête fiche -->
    <div class="fiche-header">
      <div class="fiche-header-top">
        <div class="fiche-avatar">${Utils.escHtml(initiales(nom, prenom))}</div>
        <div class="fiche-identity">
          <div class="fiche-name">${Utils.escHtml(prenom)} ${Utils.escHtml(nom)}</div>
          <div class="fiche-sub">
            <span>${Utils.escHtml(antenne) || '—'}</span>
            ${age ? `<span class="fiche-sub-sep">·</span><span>${Utils.escHtml(age)} ans</span>` : ''}
            ${dateInscription !== '—' ? `<span class="fiche-sub-sep">·</span><span>Inscrit·e le ${dateInscription}</span>` : ''}
          </div>
          <div class="fiche-meta" style="margin-top:10px;">
            <span class="badge ${badgeClass}">${Utils.escHtml(statut) || '—'}</span>
          </div>
        </div>
        <div class="fiche-actions">
          <a href="https://app.baserow.io/database/${FCP_CONFIG.tables.benevoles}/" target="_blank"
             class="btn btn-ghost">🔗 Baserow</a>
          <a href="benevoles.html" class="btn btn-ghost">← Liste</a>
        </div>
      </div>
    </div>

    <!-- Grille de cards -->
    <div class="fiche-grid">

      <!-- Coordonnées -->
      <div class="fiche-card">
        <div class="fiche-card-header">
          <span class="fiche-card-icon">📞</span>
          <span class="fiche-card-title">Coordonnées</span>
        </div>
        <div class="fiche-card-body">
          <div class="fiche-row">
            <div class="fiche-label">Email</div>
            <div class="fiche-value">
              ${email ? `<a href="mailto:${Utils.escHtml(email)}">${Utils.escHtml(email)}</a>` : '<span class="empty">Non renseigné</span>'}
            </div>
          </div>
          <div class="fiche-row">
            <div class="fiche-label">Téléphone</div>
            <div class="fiche-value">
              ${tel ? `<a href="tel:${Utils.escHtml(tel)}">${Utils.escHtml(tel)}</a>` : '<span class="empty">Non renseigné</span>'}
            </div>
          </div>
          <div class="fiche-row">
            <div class="fiche-label">Adresse</div>
            <div class="fiche-value ${!adresse ? 'empty' : ''}">${adresse ? Utils.escHtml(adresse) : 'Non renseignée'}</div>
          </div>
        </div>
      </div>

      <!-- Informations personnelles -->
      <div class="fiche-card">
        <div class="fiche-card-header">
          <span class="fiche-card-icon">👤</span>
          <span class="fiche-card-title">Informations personnelles</span>
        </div>
        <div class="fiche-card-body">
          <div class="fiche-row">
            <div class="fiche-label">Date de naissance</div>
            <div class="fiche-value ${dob === '—' ? 'empty' : ''}">${dob !== '—' ? dob : 'Non renseignée'}${age ? ` <span style="color:var(--text3); font-size:11px;">(${Utils.escHtml(age)} ans)</span>` : ''}</div>
          </div>
          <div class="fiche-row">
            <div class="fiche-label">Antenne</div>
            <div class="fiche-value ${!antenne ? 'empty' : ''}">${antenne ? Utils.escHtml(antenne) : 'Non renseignée'}</div>
          </div>
          <div class="fiche-row">
            <div class="fiche-label">Statut</div>
            <div class="fiche-value"><span class="badge ${badgeClass}">${Utils.escHtml(statut) || '—'}</span></div>
          </div>
          <div class="fiche-row">
            <div class="fiche-label">Date d'inscription</div>
            <div class="fiche-value ${dateInscription === '—' ? 'empty' : ''}">${dateInscription !== '—' ? dateInscription : 'Non renseignée'}</div>
          </div>
          <div class="fiche-row">
            <div class="fiche-label">Fiche créée le</div>
            <div class="fiche-value ${dateCreation === '—' ? 'empty' : ''}">${dateCreation !== '—' ? dateCreation : '—'}</div>
          </div>
        </div>
      </div>

      <!-- Activité bénévole -->
      <div class="fiche-card">
        <div class="fiche-card-header">
          <span class="fiche-card-icon">🤝</span>
          <span class="fiche-card-title">Activité bénévole</span>
        </div>
        <div class="fiche-card-body">
          <div class="fiche-row">
            <div class="fiche-label">Planning</div>
            <div class="fiche-value">
              ${planning ? `<div class="tag-list">${planning.split(', ').map(t => `<span class="tag">${Utils.escHtml(t)}</span>`).join('')}</div>` : '<span class="empty">Aucun planning</span>'}
            </div>
          </div>
          <div class="fiche-row">
            <div class="fiche-label">Sorties</div>
            <div class="fiche-value">
              ${sorties ? `<div class="tag-list">${sorties.split(', ').map(t => `<span class="tag">${Utils.escHtml(t)}</span>`).join('')}</div>` : '<span class="empty">Aucune sortie</span>'}
            </div>
          </div>
          <div class="fiche-row">
            <div class="fiche-label">Réunion d'info</div>
            <div class="fiche-value ${!ri ? 'empty' : ''}">${ri ? Utils.escHtml(ri) : 'Non renseignée'}</div>
          </div>
        </div>
      </div>

      <!-- Notes & observations -->
      <div class="fiche-card">
        <div class="fiche-card-header">
          <span class="fiche-card-icon">📝</span>
          <span class="fiche-card-title">Notes & observations</span>
        </div>
        <div class="fiche-card-body">
          <div class="fiche-row">
            <div class="fiche-label">Notes</div>
            <div class="fiche-value ${!notes ? 'empty' : ''}" style="white-space:pre-wrap;">${notes ? Utils.escHtml(notes) : 'Aucune note'}</div>
          </div>
          <div class="fiche-row">
            <div class="fiche-label">Note d'inscription</div>
            <div class="fiche-value ${!noteInscription ? 'empty' : ''}">${noteInscription ? Utils.escHtml(noteInscription) : 'Aucune'}</div>
          </div>
          ${radie ? `
          <div class="fiche-row">
            <div class="fiche-label">Raison radiation</div>
            <div class="fiche-value ${!raisonRadiation ? 'empty' : ''}">${raisonRadiation ? Utils.escHtml(raisonRadiation) : 'Non renseignée'}</div>
          </div>` : ''}
        </div>
      </div>

    </div><!-- /fiche-grid -->
  `;

  document.getElementById('ficheContent').innerHTML = html;
}

// ── Chargement ──
async function loadFiche() {
  const id = getIdFromUrl();

  if (!id) {
    document.getElementById('ficheContent').innerHTML = `
      <div class="fiche-loading">
        <div class="state-icon">⚠️</div>
        <div class="state-title">Aucun bénévole sélectionné</div>
        <div class="state-sub">Retournez à la liste et cliquez sur un bénévole.</div>
        <a href="benevoles.html" class="btn btn-primary" style="margin-top:8px;">← Retour à la liste</a>
      </div>`;
    return;
  }

  try {
    const row = await API.getRow(FCP_CONFIG.tables.benevoles, id);
    renderFiche(row);
  } catch (err) {
    document.getElementById('ficheContent').innerHTML = `
      <div class="fiche-loading">
        <div class="state-icon">⚠️</div>
        <div class="state-title">Erreur de chargement</div>
        <div class="state-sub">${Utils.escHtml(err.message)}</div>
        <a href="benevoles.html" class="btn btn-ghost" style="margin-top:8px;">← Retour à la liste</a>
      </div>`;
    Utils.showToast('❌ ' + err.message, 'error');
  }
}

loadFiche();
</script>
</body>
</html>
